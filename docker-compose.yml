version: '3.8'

services:
  real-estate-app:
    build: .
    ports:
      - "7860:7860"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=False
    volumes:
      - ./dataset:/app/dataset
      - ./vector_db:/app/vector_db
      - ./user_data:/app/user_data
      - ./logs:/app/logs
    restart: unless-stopped